<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pingay Smart</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="smart-view">
  <div id="smart-header">
    <div class="title">Pingay — Janela Inteligente</div>
    <div class="controls">
      <div class="ctrl-btn" id="smart-btn-min" title="Minimizar">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
      </div>
      <div class="ctrl-btn" id="smart-btn-close" title="Fechar Janela Inteligente">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </div>
    </div>
  </div>

  <div class="mini-grid" id="smart-grid">
    <!-- Mini cards renderizados via JS -->
  </div>

  <script src="js/smart-window.js"></script>
</body>
</html>
